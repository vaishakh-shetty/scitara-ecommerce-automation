name: CI — ShopEase E-Commerce

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Install & Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────
  # Stage 2: API Tests (Left Shift)
  # ─────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start json-server
        run: npx json-server --watch db.json --port 3001 &
        shell: bash

      - name: Wait for json-server
        run: npx wait-on http://localhost:3001/products --timeout 15000

      - name: Run API tests
        run: npx playwright test tests/api --reporter=html

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────
  # Stage 3: E2E Tests
  # ─────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build React app
        run: npm run build

      - name: Start json-server
        run: npx json-server --watch db.json --port 3001 &
        shell: bash

      - name: Start Vite preview
        run: npx vite preview --port 5173 &
        shell: bash

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3001/products --timeout 15000
          npx wait-on http://localhost:5173 --timeout 15000

      - name: Run E2E tests
        run: npx playwright test tests/specs --reporter=html

      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/
          retention-days: 3

  # ─────────────────────────────────────────
  # Stage 4: Load Tests (Smoke only in CI)
  # ─────────────────────────────────────────
  load-tests:
    name: Load Tests (Smoke)
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Start json-server
        run: npx json-server --watch db.json --port 3001 &
        shell: bash

      - name: Wait for json-server
        run: npx wait-on http://localhost:3001/products --timeout 15000

      - name: Run k6 smoke test
        run: k6 run load/smoke.test.js --out json=load/smoke-results.json

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: load/smoke-results.json
          retention-days: 7
